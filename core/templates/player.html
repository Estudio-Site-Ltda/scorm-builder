<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{COURSE_TITLE}}</title>
  <script src="scorm_api.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #1a1a1a;
      color: #fff;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      min-height: 100dvh;
    }
    #slide-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      overflow: hidden;
    }
    #slide-img {
      max-width: 100%;
      height: auto;
      display: block;
      border-radius: 4px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }
    #controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 12px 16px;
      background: #111;
      flex-shrink: 0;
    }
    button {
      background: #444;
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 18px;
      cursor: pointer;
      min-width: 48px;
      min-height: 48px;
      touch-action: manipulation;
    }
    button:hover:not(:disabled) { background: #666; }
    button:active:not(:disabled) { background: #888; }
    button:disabled { opacity: 0.3; cursor: default; }
    #counter {
      font-size: 14px;
      color: #aaa;
      min-width: 80px;
      text-align: center;
      user-select: none;
    }
  </style>
</head>
<body>
  <div id="slide-container">
    <img id="slide-img" src="" alt="Slide">
  </div>
  <div id="controls">
    <button id="btn-prev" onclick="navigate(-1)" aria-label="Slide anterior">&#8592;</button>
    <span id="counter">1 / {{SLIDE_COUNT}}</span>
    <button id="btn-next" onclick="navigate(1)" aria-label="Próximo slide">&#8594;</button>
  </div>

  <script>
    var slides = {{SLIDES_JSON}};
    var current = 0;
    var completed = false;

    function render() {
      var img = document.getElementById('slide-img');
      img.src = slides[current];
      img.alt = 'Slide ' + (current + 1);
      document.getElementById('counter').textContent = (current + 1) + ' / ' + slides.length;
      document.getElementById('btn-prev').disabled = current === 0;
      document.getElementById('btn-next').disabled = current === slides.length - 1;

      if (current === slides.length - 1 && !completed) {
        completed = true;
        LMSSetValue('cmi.core.lesson_status', 'completed');
        LMSCommit();
      }
    }

    function navigate(dir) {
      var next = current + dir;
      if (next < 0 || next >= slides.length) return;
      current = next;
      render();
    }

    // Navegação por teclado
    document.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navigate(1);
      if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') navigate(-1);
    });

    // Navegação por swipe (touch)
    var touchStartX = 0;
    document.addEventListener('touchstart', function(e) {
      touchStartX = e.changedTouches[0].clientX;
    }, { passive: true });
    document.addEventListener('touchend', function(e) {
      var diff = touchStartX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 50) navigate(diff > 0 ? 1 : -1);
    }, { passive: true });

    window.onload = function() {
      LMSInitialize();
      render();
    };

    window.onbeforeunload = function() {
      LMSFinish();
    };
  </script>
</body>
</html>
