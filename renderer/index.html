<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'">
  <title>Conversor SCORM</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #0c0c0e;
      --surface:       rgba(255,255,255,0.04);
      --surface-hover: rgba(255,255,255,0.08);
      --border:        rgba(255,255,255,0.08);
      --border-strong: rgba(255,255,255,0.14);
      --text:          #ececec;
      --text-muted:    rgba(255,255,255,0.38);
      --green:         rgb(52,211,153);
      --green-bg:      rgba(52,211,153,0.12);
      --danger:        rgba(255,100,100,0.85);
    }

    body {
      font-family: 'Segoe UI Variable', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      user-select: none;
    }

    /* ── Titlebar ─────────────────────────────── */
    #titlebar {
      height: 36px;
      -webkit-app-region: drag;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      position: relative;
    }
    #titlebar .title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    #btn-close {
      position: absolute;
      right: 14px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #ff5f57;
      border: none;
      cursor: pointer;
      -webkit-app-region: no-drag;
      opacity: 0.7;
      transition: opacity 0.15s;
    }
    #btn-close:hover { opacity: 1; }

    /* ── Content area ─────────────────────────── */
    #content {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0 28px 28px;
      min-height: 0;
    }

    /* ── Views ────────────────────────────────── */
    .view { display: none; flex-direction: column; flex: 1; }
    .view.active { display: flex; }

    /* ── View: Upload ─────────────────────────── */
    #view-upload {
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    #drop-zone {
      border: 1.5px dashed var(--border-strong);
      border-radius: 16px;
      padding: 40px 32px;
      text-align: center;
      width: 100%;
      cursor: pointer;
      background: var(--surface);
      transition: border-color 0.15s, background 0.15s;
    }
    #drop-zone:hover,
    #drop-zone.drag-over {
      border-color: rgba(255,255,255,0.3);
      background: var(--surface-hover);
    }
    #drop-zone .icon     { font-size: 34px; margin-bottom: 14px; }
    #drop-zone .primary  { font-size: 14px; font-weight: 500; }
    #drop-zone .secondary{ font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    #error-msg { font-size: 12px; color: var(--danger); min-height: 18px; text-align: center; }
    #hint      { font-size: 11px; color: rgba(255,255,255,0.2); }

    /* ── View: Converting ─────────────────────── */
    #view-converting {
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    #converting-filename {
      font-size: 12px;
      color: var(--text-muted);
      max-width: 340px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .spinner {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 3px solid var(--border-strong);
      border-top-color: rgba(255,255,255,0.65);
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #progress-text { font-size: 13px; font-weight: 500; }
    #progress-bar-track {
      width: 100%;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    #progress-bar-fill {
      height: 100%;
      background: rgba(255,255,255,0.55);
      border-radius: 2px;
      transition: width 0.2s ease;
      width: 0%;
    }

    /* ── View: Review ─────────────────────────── */
    #view-review { gap: 16px; justify-content: center; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--green-bg);
      border: 1px solid rgba(52,211,153,0.25);
      border-radius: 100px;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 500;
      color: var(--green);
      align-self: flex-start;
    }
    .field-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .field-input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border-strong);
      border-radius: 8px;
      padding: 9px 12px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .field-input:focus { border-color: rgba(255,255,255,0.28); }

    .info-row { display: flex; gap: 12px; }
    .info-card {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
    }
    .info-card .label {
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 3px;
    }
    .info-card .value { font-size: 13px; font-weight: 500; }

    .btn-row { display: flex; gap: 8px; margin-top: auto; }
    .btn {
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .btn:active:not(:disabled) { transform: scale(0.97); }
    .btn:disabled { opacity: 0.5; cursor: default; }
    .btn-secondary {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border-strong);
      color: var(--text-muted);
    }
    .btn-secondary:hover:not(:disabled) { background: var(--surface-hover); color: var(--text); }
    .btn-primary {
      flex: 2;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.16);
      color: var(--text);
    }
    .btn-primary:hover:not(:disabled) { background: rgba(255,255,255,0.16); }
  </style>
</head>
<body>

  <div id="titlebar">
    <span class="title">Conversor SCORM</span>
    <button id="btn-close" title="Fechar"></button>
  </div>

  <div id="content">

    <!-- View: Upload -->
    <div id="view-upload" class="view active">
      <div id="drop-zone">
        <div class="icon">📄</div>
        <div class="primary">Arraste um PDF aqui</div>
        <div class="secondary">ou clique para selecionar</div>
      </div>
      <div id="error-msg"></div>
      <div id="hint">Apenas arquivos .pdf</div>
      <input type="file" id="file-input" accept=".pdf" style="display:none">
    </div>

    <!-- View: Converting -->
    <div id="view-converting" class="view">
      <div id="converting-filename"></div>
      <div class="spinner"></div>
      <div id="progress-text">Iniciando conversão…</div>
      <div id="progress-bar-track">
        <div id="progress-bar-fill"></div>
      </div>
    </div>

    <!-- View: Review -->
    <div id="view-review" class="view">
      <div class="badge">
        <svg width="12" height="12" viewBox="0 0 256 256" fill="currentColor">
          <path d="M229.66,77.66l-128,128a8,8,0,0,1-11.32,0l-56-56a8,8,0,0,1,11.32-11.32L96,188.69,218.34,66.34a8,8,0,0,1,11.32,11.32Z"/>
        </svg>
        Conversão concluída
      </div>
      <div>
        <div class="field-label">Nome do curso</div>
        <input type="text" id="course-title-input" class="field-input">
      </div>
      <div class="info-row">
        <div class="info-card">
          <div class="label">Slides</div>
          <div class="value" id="info-slides">—</div>
        </div>
        <div class="info-card">
          <div class="label">Tamanho</div>
          <div class="value" id="info-size">—</div>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-secondary" id="btn-reset">← Converter outro</button>
        <button class="btn btn-primary"   id="btn-save">Salvar .zip →</button>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
